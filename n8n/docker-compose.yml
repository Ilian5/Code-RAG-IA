services:
  # ============ INFRASTRUCTURE ============

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      N8N_DOMAIN: ${N8N_DOMAIN}
      RAG_DOMAIN: ${RAG_DOMAIN}
      NEWS_DOMAIN: ${NEWS_DOMAIN}
      MCP_DOMAIN: ${MCP_DOMAIN}
      DB_DOMAIN: ${DB_DOMAIN}
      QDRANT_DOMAIN: ${QDRANT_DOMAIN}
      SSL_EMAIL: ${SSL_EMAIL}
      BASIC_AUTH_N8N_USER: ${BASIC_AUTH_N8N_USER}
      BASIC_AUTH_N8N_HASH: ${BASIC_AUTH_N8N_HASH}
      BASIC_AUTH_RAG_USER: ${BASIC_AUTH_RAG_USER}
      BASIC_AUTH_RAG_HASH: ${BASIC_AUTH_RAG_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/rag/news/build:/srv/news:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
      - rag-api
      - mcp-server
      - adminer
    networks:
      - app-network

  # ============ N8N ============

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_DOMAIN}/
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PROXY_HOPS: 1
      N8N_SECURE_COOKIE: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ============ RAG STACK (100% LOCAL) ============

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 30m
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  mcp-server:
    build:
      context: /opt/rag/mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news
      RAG_API_URL: http://rag-api:8000
    depends_on:
      postgres:
        condition: service_healthy
      rag-api:
        condition: service_started
    networks:
      - app-network

  rag-api:
    build:
      context: /opt/rag/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/news
      LLM_MODEL: ${RAG_LLM_MODEL}
      EMBED_MODEL: ${RAG_EMBED_MODEL}
      CHUNK_SIZE: ${RAG_CHUNK_SIZE}
      CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP}
      TOP_K: ${RAG_TOP_K}
      INBOX_DIR: /data/inbox
      PROCESSED_DIR: /data/processed
    volumes:
      - /opt/rag/inbox:/data/inbox
      - /opt/rag/processed:/data/processed
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:
  ollama_data:
  qdrant_data:

networks:
  app-network:
    driver: bridge
